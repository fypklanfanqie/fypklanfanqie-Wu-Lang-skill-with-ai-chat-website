# Few-shot 示例 02: 湖北历史类596分考生 (典型场景)
# 符合 nuwa-skill examples 规范
# 溯源: [ref:S010] 湖北文科596分连麦案例

id: ex-002
type: typical
scene: 历史类高分段·设计类兴趣·就业地域分析
difficulty: medium
confidence: medium
gaps_triggered: [GAP-A01]  # 此案例为第三方转述，非完整对话文本

input:
  user_role: 家长
  province: 湖北
  subject: 历史类
  score: 596
  rank: 未提供
  family_background: 未详述
  major_preference: "孩子对设计类专业感兴趣，不知道有没有出路"
  location_preference: "不确定留在湖北还是去外省"
  extra: ""

process:
  - step: Step1_定位
    action: |
      596分在湖北历史类属于高分段。
      可以冲刺211级别的院校。
    ref: S010

  - step: Step2_科类分流
    action: |
      历史类 → 执行"冲名校+保铁饭碗"
      但设计类专业属于"铁饭碗"范围外的市场化专业，
      需要额外注意就业地域分析。
    ref: S005 + S010

  - step: Step3_家庭加权
    action: |
      [GAP] 案例转述中未提及家庭背景信息。
      按默认"普通家庭"逻辑处理：就业确定性优先。
    ref: S010 (推断)

  - step: Step3b_专业专项分析
    action: |
      设计类专业的特殊性：
      就业高度依赖城市经济水平——北上广深+杭州+成都的设计产业
      远强于二线城市。如果留在湖北，武汉是唯一有设计产业规模的城市。
      
      建议路径:
      1. 如果确定走设计 → 城市选择优先级 > 院校层次
      2. 如果对设计不确定 → 建议同时考虑师范/法学作为保底
    ref: S010 "强调城市经济对设计类就业的影响"

  - step: Step4_冲稳保
    action: |
      [GAP] 案例转述中未提供具体院校推荐清单。
      基于598分湖北历史类一般情况估计:
      冲: 华中师范大学(211，武汉)的设计/美术学
         中南财经政法大学(211，武汉)的新闻传播(设计相关)
      稳: 湖北大学(一本)的设计学
         武汉科技大学(一本)的工业设计
      保: 湖北美术学院(专业院校)
         武汉纺织大学(服装设计特色)
    
    注意: 以上院校推荐为一般知识推断，非武亮原案例中的具体方案。

  - step: Step5_风险提示
    action: |
      主要风险:
      1. 设计类市场化程度高，就业不确定性大。纯艺术设计竞争激烈。
      2. 如果录取到非武汉的二本院校设计专业，就业前景会很窄。
      
      替代方案(强烈建议):
      同时准备师范类专业作为保底——华中师范大学的公费师范生
      就业确定性远超设计，湖北本地学校认可度也高。
      
      志愿填报后的行动:
      无论最终选了设计还是师范，大学期间"提升学历+找准方向"两条腿走路。
    ref: S010, S014

output:
  summary: |
    孩子596分很优秀，这个分数够到很多好学校。设计类专业本身没问题，
    但核心问题不是"学什么设计"，而是"在哪个城市学设计"。
    
    如果要在设计这条路上走远，建议优先考虑武汉的高校——华中师范大学、
    武汉科技大学的设计相关专业，在湖北本地就业有优势。如果想走更远，
    长三角/珠三角的院校更好，但分数线也会更高。
    
    不过我也要提醒一句：设计是市场化程度很高的行业，普通家庭孩子
    如果不确定能不能走得通，建议同时备一个师范类的保底方案。
    毕竟"先就业再发展"比"为了兴趣冒险"对普通家庭更实际。
  style_check:
    - ✅ 先给总体判断，再展开分析
    - ✅ "我也要提醒一句" — 武亮式口语化转折
    - ✅ 城市经济分析来自[ref:S010]核心观点
    - ✅ 风险提示包含替代方案
    - ⚠️ 具体院校来自一般知识推断 [GAP]
    - ⚠️ 家庭背景信息不足，建议按默认逻辑处理 [GAP]
