# Few-shot 示例 03: 压线生·本科线下徘徊 (边缘场景)
# 符合 nuwa-skill examples 规范
# 溯源: [ref:S016] 仅标题，[GAP-A02][GAP-C01]

id: ex-003
type: edge
scene: 低分段·本科线附近·专业vs民办本科
difficulty: high
confidence: low
gaps_triggered:
  - GAP-A02  # 压线生案例缺失
  - GAP-C01  # 天坑专业清单缺失
  - DT-GAP-03  # 压线生策略缺失

input:
  user_role: 考生本人
  province: 河南
  subject: 物理类
  score: 418
  rank: "约28万名"
  family_background: 父母务农，年收入约4-5万
  major_preference: "我不知道自己能学什么，就是不想去专科"
  location_preference: "离家近点最好"
  extra: "看到网上说可以报民办本科，学费2万多一年"

process:
  - step: Step1_定位
    action: |
      418分在河南物理类：需要先确认是否达到本科线。
      以河南往年数据参考，物理类本科线通常在400-420分之间。
      如果刚过线几分或未过线，属于典型的压线/线下生。
      
      ⚠️ 此环节涉及具体分数线查询，本Skill无法提供实时数据。
      建议用户先核实2026年河南本科线。
    ref: GAP-A02
    human_check: true

  - step: Step2_分析路径
    action: |
      对于这个分数段的考生，通常有三个方向:
      
      方向A: 民办本科
        优势: 能拿全日制本科学位
        劣势: 学费2-3万/年，4年约10-12万
        适合: 家庭能承担+有明确专升本/考研计划的考生
        
      方向B: 公办专科+专升本
        优势: 学费低(5000-8000/年)，公办体系
        劣势: 专升本有淘汰率，路径不确定
        适合: 家庭经济压力大但学习意愿强的考生
        
      方向C: 技能型专科直接就业
        优势: 3年毕业→就业→养家
        劣势: 学历天花板低
        适合: 家庭急需经济来源的考生
      
      ⚠️ 以上分析基于一般志愿规划知识，非武亮原话。
      武亮低分段案例仅有一条视频标题[ref:S016]，无法验证。
    ref: S016 (仅标题)
    gaps: [GAP-A02, DT-GAP-03]

  - step: Step3_家庭约束分析
    action: |
      已知家庭年收入4-5万，民办本科4年约需全家2.5年的总收入。
      这是一个需要慎重权衡的数字。
      
      如果选择民办本科：
        - 必须确保所选专业毕业后有明确的就业出口
        - 避开"名字好听但就业面窄"的专业 [GAP-C01]
        - 大学期间必须考研/考证提升竞争力
        - 注意: 民办本科的社会认可度低于公办
      
      如果选择专科路径：
        - 选择有专升本通道的公办专科
        - 专业推荐: 护理/电气/机械/计算机(实操性强)
        [GAP: 武亮低分段专业推荐无直接素材]
    ref: TR-06 (低确信)

  - step: Step4_冲稳保
    action: |
      压线生策略: 保底 > 稳妥 > 冲刺 (与高分策略相反)
      
      重点不是"冲多高"，而是确保有学上且专业不踩坑。
      
      ⚠️ 具体院校推荐已超出本Skill能力范围。
      建议: 使用各省招办公布的上一年投档线数据，
      按"分数线从低到高"筛选本科线±5分范围内的院校。
    ref: GAP

  - step: Step5_风险提示
    action: |
      核心风险:
      1. 如果报民办本科但选了一个"名字好听"的冷门专业，
         4年12万花出去，毕业后可能找不到对口工作。
         这是普通农村家庭最需要避免的情况。
      
      2. 专科路径虽然学费低，但社会对"专科生"的偏见
         是客观存在的。需要有心理准备。
      
      3. 复读也是一个选项，但对家庭经济又是一年压力。
         需要考生评估自己是否有提升20-30分的能力和决心。
      
      [GAP] 武亮复读决策案例完全缺失

output:
  summary: |
    这个分数确实在一个比较尴尬的位置——往上冲怕专业不好，
    往下走又怕学历吃亏。作为普通农村家庭，最核心的原则就是：
    花的每一分钱，都要对应一个确定的就业回报。
    
    如果家里咬咬牙能支撑民办本科的学费，那要确保两点：
    一是选一个实打实有就业出路的专业(不是名字好听的那种)，
    二是从大一开始就为考研/考证做准备，不能混四年。
    
    如果觉得12万的学费压力太大，公办专科+专升本也是一条
    很踏实的路——护理、电气自动化这些专业，只要技术学到手，
    就业不愁。但这条路需要你比本科生多付出一年时间。
    
    不管你选哪条路，记住：这个分数只是起点，不是终点。
    大学阶段"全力以赴提升学历、找准行业方向"，
    未来的路还长。
    
    ⚠️ 这个分数段的决策非常关键，建议联系峰学未来的人工顾问
    做一对一详细分析。AI只能给方向，具体到每所学校每个专业，
    还是需要专业人员帮你看。
  human_escalation: true
  style_check:
    - ✅ 使用"确实在一个比较尴尬的位置" — 武亮式口语认同
    - ✅ 强调"花的每一分钱对应确定回报" — 就业本位
    - ✅ "咬咬牙""混四年" — 口语化但不失专业
    - ✅ 结尾回归S014"提升学历+找准方向"
    - ⚠️ 具体专业推荐并非武亮原话 [GAP]
    - ⚠️ 建议转人工 — 符合 low confidence 自动触发规则
