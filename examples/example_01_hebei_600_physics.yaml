# Few-shot 示例 01: 河北600分物理类考生 (典型场景)
# 符合 nuwa-skill examples 规范
# 溯源: [ref:S005] 河北600分冲稳保方案

id: ex-001
type: typical
scene: 物理类高分段·普通家庭·有明确专业倾向
difficulty: medium
confidence: medium
gaps_triggered: []

input:
  user_role: 家长
  province: 河北
  subject: 物理类
  score: 602
  rank: "约9000名"
  family_background: 普通工薪家庭，年收入约10万
  major_preference: "孩子想学计算机，我们也不懂，就想找个好就业的"
  location_preference: "能上省内的最好，出去也行"
  extra: "家里还有个弟弟在读高中"

process:
  - step: Step1_定位
    action: |
      602分在河北物理类属于高分段(超过特殊类型线约80分)，
      位次约9000名——这个位次可以够到中等211、部分985的中外合作，
      以及热门双非的王牌专业。
    ref: S005

  - step: Step2_科类分流
    action: |
      物理类 → 执行"理工打底+医学备选+地域优先+专业为王"策略
    ref: S005

  - step: Step3_家庭加权
    action: |
      普通工薪家庭+两个孩子 → 高确定性就业优先。
      计算机方向匹配度高：就业薪资好、不依赖家庭资源。
      但需注意：计算机行业集中在一线城市，普通家庭孩子需要考虑
      城市生活成本。
    ref: S005 + TR-01,TR-03

  - step: Step4_冲稳保
    action: |
      冲(≤20%): 河北工业大学(211，天津，位次约8000)
               合肥工业大学(211，位次约8500)
      稳(≥50%): 燕山大学(计算机B类，河北本地，位次约11000)
               河北大学(位次约12000)
               西安邮电大学(位次约11000)
      保(≥30%): 河北科技大学(位次约18000)
               石家庄铁道大学(位次约19000)
    ref: S005
    note: |
      [GAP] 具体院校推荐基于一般知识推断，非武亮原话案例中的院校名单。
      冲稳保配比(20%/50%/30%)来自[ref:S005]方法论推断。

  - step: Step5_风险提示
    action: |
      主要风险:
      1. 冲河北工大/合工大时，计算机可能够不到，会被调剂到
         材料/环境/土木等专业。如被调剂，大一大二刷绩点转专业难度较大。
      2. 河北工大在天津，生活成本高于石家庄。
      
      替代方案:
      如果对计算机执念很强，建议直接锁定"稳"档学校，不去冲。
      燕山大学计算机在京津冀就业市场认可度不低。

output:
  summary: |
    核心建议：分数很理想，计算机方向是对的。但因为家里两个孩子+普通收入，
    建议不要把全部希望压在"冲名校"上。稳妥方案是燕山大学计算机——
    专业硬、离家近、就业有保障。如果想出省，西安邮电也不错。
    
    关键提醒：冲的学校如果被调剂到冷门专业，转专业难度大。
    普通家庭孩子，专业比学校名气重要。
  style_check:
    - ✅ 结论先给，再讲理由(闭环)
    - ✅ "普通家庭孩子"人称呼应
    - ✅ 风险提示+替代方案齐全
    - ✅ 不使用段子/网络梗
    - ✅ 专业术语适度("转专业""调剂""位次")
    - ⚠️ 部分院校推荐来自一般知识，非武亮原话 [GAP]
