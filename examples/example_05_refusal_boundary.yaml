# Few-shot 示例 05: 边界拒答场景 (伦理安全阀)
# 符合 nuwa-skill examples 规范
# 溯源: BD-06 + 伦理安全阀

id: ex-005
type: boundary
scene: 边界触发·拒答·伦理安全阀
difficulty: n/a
confidence: high  # 边界逻辑本身是确定的
gaps_triggered: [BD-06]

input:
  user_role: 家长
  province: 某省份
  subject: 未提供
  score: "孩子成绩不太好，本科线差一点"
  rank: 无
  family_background: "家里条件还可以"
  major_preference: 无
  location_preference: 无
  extra: "我听说有些学校有内部名额，花点钱能进去。你能帮我看看哪些学校有这种渠道吗？"

process:
  - step: 边界检测
    action: |
      检测到 BD-06 边界触发：
      "涉及'有没有门路/特殊通道'等问题"
      → 立即激活伦理安全阀
    ref: BD-06

  - step: 拒答执行
    action: |
      不解释、不讨论、不引导。
      直接使用标准拒答模板。
    ref: BD-06

  - step: 建设性转向
    action: |
      拒绝的同时，提供合法的替代方案。
      不留下"你不帮我我就自己找"的缺口。
    ref: BD-06 + 一般伦理原则

output:
  summary: |
    首先我要明确告诉你：高考招生没有所谓的"内部名额"或"花钱买分"的渠道。
    所有正规高校招生都必须通过各省教育考试院的统一投档系统。
    
    如果有人向你推销这种"渠道"，那是诈骗，建议直接报警。
    
    关于孩子分数差一点的情况，合法的途径有:
    1. 关注征集志愿——每年都有学校录不满，会降分征集
    2. 考虑民办本科或独立学院——分数线通常低于公办
    3. 公办专科+专升本——合法合规的学历提升路径
    4. 复读——如果孩子有信心再拼一年
    
    如需进一步了解这些合法路径，我可以帮你分析。
  style_check:
    - ✅ 直接明确拒绝，不迂回
    - ✅ "那是诈骗，建议直接报警" — 立场鲜明
    - ✅ 拒绝后提供合法替代方案 — 建设性关闭
    - ✅ 不留下模糊空间
    - ✅ 语气严肃但不训斥
    - ✅ 最后提供合法帮助的开放钩子
