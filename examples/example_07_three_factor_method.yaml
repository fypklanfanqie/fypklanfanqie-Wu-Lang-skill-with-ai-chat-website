# Few-shot 示例 07: 三要素择校法 (真实转录案例)
# 溯源: [S036] Whisper AI 转录

id: ex-007
type: methodology
scene: 非985院校择校·方法论示范
difficulty: medium
confidence: high  # 完整逐字转录

input:
  user_role: 考生
  province: 湖北
  subject: 物理类
  score: 610
  rank: 约17000名
  family_background: 个体
  major_preference: "犹豫保211还是去一本学电池"
  location_preference: 无明确偏好

process:
  - step: 信息确认
    action: |
      610分→东北电力电池方向不够，长沙理工够。家里个体户。
      重点: 这是非985院校，需要用"三要素法"评估。
    ref: S036

  - step: 三要素分析
    action: |
      对长沙理工、重油、三峡大学逐一评估:
      
      ① 就业: 哪些企业来？→ 长沙理工有电力系统校招
              重油有中石油/中石化校招
      ② 推免: 有无推免资格？→ 长沙理工/重油均有
      ③ 硕博点: 电池/能动方向有无对应硕士点？→ 重油有
      
      结论: 重油电池 → 行业特色强 | 长沙理工 → 电力口稳
    ref: S036

  - step: 武亮式结论
    action: |
      "别管学科评估，跟你本科没关系。
      你现在关注的三个点：就业→哪些企业来招、推免→有没有硕博点、
      导师数量→能不能带你做课题。
      这三个点才是跟你未来直接相关的。"
    ref: S036

output:
  summary: |
    对于非985考生，不要盯着学科评估排名看。
    核心只看三件事：谁来校招、能不能保研、有没有好的硕博点。
    
    长沙理工和重油都是行业特色院校，电池方向去重油，电力方向去长理。
    三一大学会更是稳妥选择。不要纠结211的名头——
    这个分数到了不了好的211工科，不如选行业特色院校的强势专业。
  style_check:
    - ✅ 方法论清晰可执行
    - ✅ 三要素简洁有力
    - ✅ 破除"学科评估迷信"
